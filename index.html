<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Suerte Tris</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍀</text></svg>">
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1164/1164669.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Suerte Tris">
    
    <meta name="theme-color" content="#145a32">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            /* Paleta Temática Suerte */
            --primary: #145a32;       /* Verde Bosque Oscuro */
            --secondary: #27ae60;     /* Verde Esmeralda */
            --gold: #f1c40f;          /* Dorado Brillante */
            --gold-dark: #d4ac0d;     /* Dorado Oscuro (Bordes) */
            --bg-gradient: linear-gradient(135deg, #0f3b25 0%, #1e8449 100%);
            --card-bg: #ffffff;
            --text-color: #2c3e50;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-color);
            /* Evita el rebote elástico en iOS */
            overscroll-behavior-y: none; 
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            border: 2px solid var(--gold);
            box-sizing: border-box; /* Asegura que el padding no rompa el ancho */
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 1px 1px 0px rgba(0,0,0,0.1);
            font-size: 1.8rem;
        }

        .input-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            padding: 15px;
            background: rgba(241, 196, 15, 0.1);
            border-radius: 15px;
        }

        input[type="text"] {
            padding: 12px;
            font-size: 1.3rem;
            border: 2px solid var(--secondary);
            border-radius: 8px;
            text-align: center;
            width: 120px;
            letter-spacing: 4px;
            font-weight: bold;
            color: var(--primary);
            outline: none;
            /* Evita zoom automático en iPhone al tocar el input */
            font-size: 16px; 
        }

        input[type="text"]:focus {
            border-color: var(--gold);
            box-shadow: 0 0 10px rgba(241, 196, 15, 0.5);
        }

        input[type="date"] {
            padding: 12px;
            border: 2px solid var(--secondary);
            border-radius: 8px;
            color: var(--primary);
            font-weight: bold;
            font-size: 16px; /* Evita zoom en iOS */
        }

        button.generate-btn {
            padding: 12px 20px;
            font-size: 1.1rem;
            background: linear-gradient(to bottom, #f1c40f, #d4ac0d);
            color: #fff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            justify-content: center;
        }

        button.generate-btn:active {
            transform: scale(0.98);
        }
        
        #btn-download {
            padding: 12px 25px;
            font-size: 1rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            margin: 0 auto 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 80%;
        }

        .gatos-container {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 2rem;
        }

        .grid-3x3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            background: var(--gold);
            padding: 4px;
            border-radius: 8px;
            width: 140px;
            margin: 0 auto;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .cell {
            background: white;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--primary);
        }

        .escalera-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            background: #fdfefe;
            padding: 15px;
            border-radius: 15px;
            border: 2px dashed var(--gold);
        }

        .row { display: flex; gap: 6px; }

        .pyramid-cell {
            width: 30px;
            height: 30px;
            background: var(--secondary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .final-row .pyramid-cell {
            background: var(--gold);
            color: #000;
            width: 40px;
            height: 40px;
            font-size: 1.3rem;
            border: 2px solid var(--primary);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(241, 196, 15, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(241, 196, 15, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(241, 196, 15, 0); }
        }

        #capture-area {
            background-color: white;
            padding: 15px;
            border-radius: 10px;
            border-top: 5px solid var(--gold);
        }

        .disclaimer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.75rem;
            color: #bdc3c7; /* Texto más claro para no distraer en fondo oscuro */
            opacity: 0.8;
        }
        
        /* Ajustes para móviles pequeños */
        @media (max-width: 400px) {
            .input-group { flex-direction: column; }
            input[type="text"], input[type="date"] { width: 100%; box-sizing: border-box;}
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🍀 Suerte Tris 💰</h1>
    
    <div class="input-group">
        <input type="text" id="trisInput" maxlength="5" placeholder="N° Ganador" onkeypress="return /[0-9]/i.test(event.key)">
        <input type="date" id="dateInput"> 
        <button class="generate-btn" onclick="calcular()">⚡ Atraer Suerte</button>
    </div>

    <div id="results" style="display: none;">
        
        <button id="btn-download" onclick="descargarImagen()">📸 Guardar Amuleto</button>

        <div id="capture-area">
            <h2 style="text-align: center; margin-top:0; color:var(--primary); font-size:1.4rem;">🔮 Tableros</h2>
            <div class="gatos-container">
                <div class="gato-wrapper">
                    <h3 style="margin-bottom:8px; font-size:1rem;">Gato 1</h3>
                    <div class="grid-3x3" id="gato1"></div>
                </div>
                <div class="gato-wrapper">
                    <h3 style="margin-bottom:8px; font-size:1rem;">Gato 2</h3>
                    <div class="grid-3x3" id="gato2"></div>
                </div>
            </div>

            <h2 style="text-align: center; color:var(--primary); font-size:1.4rem;">🪜 Escalera</h2>
            <div class="escalera-container" id="escalera"></div>
            
            <p style="text-align: center; font-size: 0.7rem; color: #aaa; margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px;">
                🍀 Fecha de la Suerte: <span id="fecha-generacion"></span>
            </p>
        </div>
    </div>

    <div class="disclaimer">
        Entretenimiento numérico. ¡Mucha suerte!
    </div>
</div>

<script>
    // Inicializa la fecha al día de hoy
    document.getElementById('dateInput').valueAsDate = new Date();

    function sumMod10(a, b) {
        return (parseInt(a) + parseInt(b)) % 10;
    }

    function calcular() {
        const inputStr = document.getElementById('trisInput').value;
        const dateInput = document.getElementById('dateInput').value;

        if (inputStr.length !== 5 || isNaN(inputStr)) {
            alert("Por favor ingresa los 5 dígitos del Tris.");
            return;
        }

        const data = inputStr.split('').map(Number);

        renderGatos(data);
        renderEscalera(data, dateInput);
        
        document.getElementById('fecha-generacion').innerText = new Date().toLocaleString();
        document.getElementById('results').style.display = 'block';
    }

    function renderGatos(data) {
        // Gato 1
        let g1 = Array(3).fill().map(() => Array(3).fill(0));
        g1[0][0] = data[0]; g1[0][2] = data[1];
        g1[2][0] = data[3]; g1[2][2] = data[4];
        g1[0][1] = sumMod10(g1[0][2], g1[0][0]);
        g1[2][1] = sumMod10(g1[2][2], g1[2][0]);
        g1[1][0] = sumMod10(g1[0][0], g1[2][0]);
        g1[1][2] = sumMod10(g1[0][2], g1[2][2]);
        g1[1][1] = sumMod10(g1[0][1], g1[2][1]);
        drawGrid('gato1', g1);

        // Gato 2
        let g2 = Array(3).fill().map(() => Array(3).fill(0));
        g2[0][0] = data[1]; g2[0][2] = data[2];
        g2[2][0] = data[3]; g2[2][2] = data[4];
        g2[0][1] = sumMod10(g2[0][2], g2[0][0]);
        g2[2][1] = sumMod10(g2[2][2], g2[2][0]);
        g2[1][0] = sumMod10(g2[0][0], g2[2][0]);
        g2[1][2] = sumMod10(g2[0][2], g2[2][2]);
        g2[1][1] = sumMod10(g2[0][1], g2[2][1]);
        drawGrid('gato2', g2);
    }

    function drawGrid(elementId, matrix) {
        const container = document.getElementById(elementId);
        container.innerHTML = '';
        matrix.forEach(row => {
            row.forEach(num => {
                const div = document.createElement('div');
                div.className = 'cell';
                div.textContent = num;
                container.appendChild(div);
            });
        });
    }

    function renderEscalera(data, dateString) {
        const dateObj = new Date(dateString + 'T00:00:00');
        const day = dateObj.getDate();
        const unDia = day % 10;
        const decDia = Math.floor(day / 10);

        let currentLevel = [...data, decDia, unDia]; 
        const container = document.getElementById('escalera');
        container.innerHTML = '';

        drawRow(container, currentLevel);

        while (currentLevel.length > 1) {
            let nextLevel = [];
            for (let i = 0; i < currentLevel.length - 1; i++) {
                let sum = sumMod10(currentLevel[i], currentLevel[i+1]);
                nextLevel.push(sum);
            }
            currentLevel = nextLevel;
            let isFinal = currentLevel.length === 1;
            drawRow(container, currentLevel, isFinal);
        }
    }

    function drawRow(container, numbers, isFinal = false) {
        const rowDiv = document.createElement('div');
        rowDiv.className = 'row' + (isFinal ? ' final-row' : '');
        numbers.forEach(num => {
            const cell = document.createElement('div');
            cell.className = 'pyramid-cell';
            cell.textContent = num;
            rowDiv.appendChild(cell);
        });
        container.appendChild(rowDiv);
    }

    function descargarImagen() {
        const captureElement = document.getElementById('capture-area');
        const btn = document.getElementById('btn-download');
        const originalText = btn.innerHTML;
        btn.innerHTML = '⏳ Generando...';
        
        html2canvas(captureElement, {
            scale: 2,
            backgroundColor: "#ffffff",
            logging: false
        }).then(canvas => {
            const link = document.createElement('a');
            const fecha = new Date().toISOString().slice(0,10);
            link.download = `Suerte_Tris_${fecha}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
            btn.innerHTML = originalText;
        }).catch(err => {
            alert("Error al generar imagen");
            btn.innerHTML = originalText;
        });
    }
</script>

</body>
</html>
